  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-dark: #0A0A0A;
      --bg-light: #EDECE6;
      --text-white: #FFFFFF;
      --text-dark: #121212;
      --text-muted: #8E8E93;
      --text-muted-dark: #48484A;
      --brand-fluor: #FF5F1F; 
      --brand-fluor-hover: #FF7A45;
      --card-bg: #141416;
      --font-title: 'Syne', sans-serif;
      --font-body: 'Inter', sans-serif;
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { background-color: var(--bg-dark); color: var(--text-white); font-family: var(--font-body); }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    .section-inner { max-width: 1200px; margin: 0 auto; padding: 100px 24px; }

    /* Ajuste do Container de Ícones Sociais */
    .contact-icons { 
      display: flex; 
      gap: 16px; 
      margin-bottom: 40px; 
      justify-content: flex-start; /* Alinhado à esquerda como solicitado */
    }
    .contact-link {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: #1C1C1E;
      border: 1px solid #2C2C2E;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .contact-link svg { width: 20px; height: 20px; fill: var(--text-white); transition: var(--transition); }
    .contact-link:hover { background-color: var(--brand-fluor); border-color: var(--brand-fluor); }
    .contact-link:hover svg { fill: var(--text-dark); }

    /* Habilidades e Cards */
    #skills { background-color: var(--bg-light); color: var(--text-dark); }
    .section-title { font-family: var(--font-title); font-size: 3rem; margin-bottom: 48px; }
    .skills-groups { display: grid; grid-template-columns: 1.2fr 1fr; gap: 64px; }
    .skills-group-title { font-size: 0.875rem; text-transform: uppercase; margin-bottom: 32px; color: #636366; }
    .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 24px; }
    
    .tool-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .tool-icon-box {
      width: 72px; height: 72px; border-radius: 18px; background-color: #FFFFFF;
      display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
      font-weight: bold; font-size: 1.25rem; border: 1px solid #D1D1D6;
    }
    .tool-name { font-size: 0.8125rem; font-weight: 500; margin-bottom: 8px; }
    .tool-dots { display: flex; gap: 3px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background-color: #D1D1D6; }
    .dot.filled { background-color: var(--text-dark); }

    /* Classes específicas de cor para Ícones */
    .tool-ps { background: #001E36; color: #00C8FF; }
    .tool-ai { background: #330000; color: #FF9A00; }
    .tool-id { background: #330014; color: #FF3366; }
    .tool-fg { background: #2C2C2C; color: #F24E1E; }
    .tool-ae { background: #000033; color: #9999FF; }
    .tool-pr { background: #000022; color: #EA77FF; }
  </style>
</head>
