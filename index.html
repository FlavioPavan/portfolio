<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flavio Pavan | Direção de Arte & Design</title>
  
  <!-- Importando a fonte Inter para um visual clean e premium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    /* Reset de Estilos Básicos */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: #08080a; /* Fundo ultra-dark para destacar o neon */
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    /* Estrutura da Primeira Dobra (Hero Section) */
    .hero-container {
      display: flex;
      width: 100%;
      min-height: 100vh;
      align-items: center;
      justify-content: space-between;
      padding: 0 8%;
      gap: 60px;
      overflow: hidden;
      position: relative;
    }

    /* Lado Esquerdo: Textos e Tagline */
    .hero-content {
      flex: 1.2;
      max-width: 650px;
      z-index: 2;
    }

    .hero-subtitle {
      color: #00ffaa; /* Verde neon calibrado com a imagem */
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 0.85rem;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .hero-title {
      font-size: 3.8rem;
      line-height: 1.1;
      font-weight: 900;
      margin-bottom: 24px;
      letter-spacing: -1.5px;
    }

    /* Efeito de degradê no texto principal */
    .text-gradient {
      background: linear-gradient(45deg, #ff007f, #00ffaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-description {
      font-size: 1.15rem;
      color: #a0a0a8;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* Botões de Ação */
    .hero-cta {
      display: flex;
      gap: 20px;
    }

    .btn-primary {
      background-color: #ff007f; /* Magenta puxado da foto */
      color: white;
      padding: 18px 36px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      background-color: #e0006c;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255, 0, 127, 0.3);
    }

    .btn-secondary {
      border: 1px solid #2a2a30;
      color: white;
      padding: 18px 36px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background-color: #121216;
      border-color: #4a4a54;
    }

    /* Lado Direito: Imagem Artística */
    .hero-image-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      height: 85vh;
    }

    .hero-art-image {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      border-radius: 16px;
      z-index: 2;
      filter: drop-shadow(0 25px 50px rgba(0, 0, 0, 0.9));
    }

    /* Glow de fundo simulando a iluminação ambiente da imagem */
    .art-bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0, 255, 170, 0.12) 0%, rgba(255, 0, 127, 0.04) 40%, rgba(0,0,0,0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
    }

    /* Responsividade para Telas Menores (Tablets e Celulares) */
    @media (max-width: 1024px) {
      body {
        align-items: flex-start;
      }
      
      .hero-container {
        flex-direction: column-reverse;
        justify-content: center;
        padding: 80px 6%;
        text-align: center;
        gap: 50px;
      }

      .hero-content {
        width: 100%;
      }

      .hero-title {
        font-size: 2.8rem;
      }

      .hero-cta {
        justify-content: center;
      }

      .hero-image-wrapper {
        height: 50vh;
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <section class="hero-container">
    <div class="hero-content">
      <p class="hero-subtitle">Diretor de Arte & Designer Gráfico</p>
      <h1 class="hero-title">Ideias que rompem o óbvio.<br><span class="text-gradient">Design que comanda atenção.</span></h1>
      <p class="hero-description">
        Combinando estética disruptiva, visão conceitual e direção de arte de alto impacto para transformar marcas e ditar tendências visuais.
      </p>
      <div class="hero-cta">
        <a href="#portfolio" class="btn-primary">Explorar Portfólio</a>
        <a href="#contato" class="btn-secondary">Vamos criar juntos?</a>
      </div>
    </div>
    
    <div class="hero-image-wrapper">
      <!-- Puxando a sua imagem direto da pasta que você acabou de criar -->
      <img src="assets/perfil-artistic.png" alt="Flavio Pavan - Diretor de Arte" class="hero-art-image">
      <div class="art-bg-glow"></div>
    </div>
  </section>

</body>
</html>
